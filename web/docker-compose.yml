name: aindrive

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Payment network must be a BUILD arg (NEXT_PUBLIC_* is inlined into the
        # client bundle at `next build`). Putting it only in .env (runtime) would
        # flip the server but leave the browser on the baked default — split-brain.
        # Compose reads ${...} from the same .env, so one value drives both stages.
        NEXT_PUBLIC_AINDRIVE_PAYMENT_NETWORK: ${NEXT_PUBLIC_AINDRIVE_PAYMENT_NETWORK:-testnet}
    restart: unless-stopped
    # Runtime env. Both files are optional and later wins, so prod hosts can
    # keep real values in `.env.production` (gitignored) without renaming to
    # `.env`. NOTE: the NEXT_PUBLIC_* build arg above is read by compose from
    # the HOST shell or `.env` only (compose does NOT read `.env.production`
    # for ${...} interpolation) — so for a mainnet build, either put
    # NEXT_PUBLIC_AINDRIVE_PAYMENT_NETWORK in `.env`/the shell, or pass
    # `--build-arg`. See .env.production.example go-live checklist.
    env_file:
      - path: ./.env
        required: false
      - path: ./.env.production
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3737"
      AINDRIVE_DATA_DIR: /data
    volumes:
      - aindrive-data:/data
    ports:
      - "127.0.0.1:3738:3737"

volumes:
  aindrive-data:
