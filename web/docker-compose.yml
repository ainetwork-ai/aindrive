name: aindrive

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3737"
      AINDRIVE_DATA_DIR: /data
    volumes:
      - aindrive-data:/data
    ports:
      - "127.0.0.1:3738:3737"

volumes:
  aindrive-data:
