name: aindrive

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined into the CLIENT bundle at `next build`, so it
        # must be a BUILD arg — a runtime-only value would leave the browser on
        # the baked default while the server flips (split-brain). Compose reads
        # ${...} from the project-dir `.env` (or the shell) — the SAME single
        # `.env` used for runtime below, so one file drives everything.
        NEXT_PUBLIC_AINDRIVE_PAYMENT_NETWORK: ${NEXT_PUBLIC_AINDRIVE_PAYMENT_NETWORK:-testnet}
        # Same build-time rule. Empty = WalletConnect relay flows (mobile-browser
        # visitors paying with a wallet APP) stay broken; everything else is fine.
        NEXT_PUBLIC_WC_PROJECT_ID: ${NEXT_PUBLIC_WC_PROJECT_ID:-}
    restart: unless-stopped
    # ONE env file: a single gitignored `.env` holds BOTH the NEXT_PUBLIC build
    # vars (read above for ${...} interpolation) AND the runtime secrets (CDP
    # keys, SESSION_SECRET, …) injected here. `.env.example` is the committed
    # template. (Local dev that runs `node server.js` directly uses `.env.local`
    # via @next/env — a separate path from this container.)
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3737"
      AINDRIVE_DATA_DIR: /data
    volumes:
      - aindrive-data:/data
    ports:
      - "127.0.0.1:3738:3737"

volumes:
  aindrive-data:
